# Server
server.port=${SERVER_PORT:8081}

# Backend URL
gateway.backend.url=${BACKEND_URL:http://localhost:8080}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DB:FintechGateway}
spring.datasource.username=${MYSQL_USER:aaryan}
spring.datasource.password=${MYSQL_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Swagger
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html

# Risk thresholds
gateway.risk.block-threshold=${RISK_BLOCK_THRESHOLD:71}
gateway.risk.throttle-threshold=${RISK_THROTTLE_THRESHOLD:31}

# Rate limiting
gateway.ratelimit.window-minutes=${RATE_WINDOW_MINUTES:1}
gateway.ratelimit.high-trust-limit=${RATE_HIGH_TRUST:50}
gateway.ratelimit.medium-trust-limit=${RATE_MEDIUM_TRUST:30}
gateway.ratelimit.low-trust-limit=${RATE_LOW_TRUST:10}
